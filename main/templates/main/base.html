{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Template</title>

    <link rel="stylesheet" href="{% static 'main/css/base.css' %}">
    <link rel="stylesheet" href="{% static 'main/css/topbar.css' %}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    {% block extra_css %}{% endblock %}
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">

    <h3>Menu</h3>

    <ul>

        <li>
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </li>

        <li>
            <i class="fa-solid fa-table-columns"></i>
            <span>Dashboard</span>
        </li>

        <li>
            <i class="fa-solid fa-gear"></i>
            <span>Settings</span>
        </li>

    </ul>

</div>

    <!-- Main -->
    <div class="main">

        <!-- Topbar -->
        <div class="topbar">

            <!-- Left Section -->
            <div class="left-section">

                <div class="topbar-left">

                    <div class="menu-icon" id="menuToggle">
                        <i class="fa-solid fa-bars"></i>
                    </div>

                    <div class="logo">
                        YouTube<span>Clone</span>
                    </div>

                </div>

                <!-- Search Bar -->
                <div class="search-bar">
                    <input type="text" placeholder="Search">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>

            </div>

            <!-- Right Section -->
            <div class="right-section">

                <div class="icon-box create-box">
                    <i class="fa-solid fa-plus"></i>
                    <span>Create</span>
                </div>

                <div class="bell-icon">
                    <i class="fa-regular fa-bell"></i>
                </div>

                <!-- Profile Dropdown -->
                <div class="profile-wrapper">

                    <div class="profile-circle" id="profileBtn">
                        T
                    </div>

                    <div class="profile-dropdown" id="profileMenu">

                        <a href="#">
                            <i class="fa-solid fa-user"></i>
                            My Profile
                        </a>

                        <a href="#">
                            <i class="fa-solid fa-video"></i>
                            Your Channel
                        </a>

                        <a href="#">
                            <i class="fa-solid fa-clock-rotate-left"></i>
                            History
                        </a>

                        <a href="#">
                            <i class="fa-solid fa-gear"></i>
                            Settings
                        </a>

                        <a href="#">
                            <i class="fa-solid fa-right-from-bracket"></i>
                            Logout
                        </a>

                    </div>

                </div>

            </div>

        </div>

        <!-- Page Content -->
        <div class="content">
            {% block content %}
            {% endblock %}
        </div>

    </div>

    <!-- JS should be loaded at the end of body -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="{% static 'main/js/collaps.js' %}"></script>
    <script src="{% static 'main/js/profile.js' %}"></script>

</body>
</html>
